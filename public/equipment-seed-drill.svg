<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sdsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#sdsky)"/>
  <rect y="280" width="800" height="120" fill="#795548" opacity="0.4"/>
  <!-- Furrows -->
  <g opacity="0.3">
    <line x1="0" y1="300" x2="800" y2="300" stroke="#5D4037" stroke-width="2"/>
    <line x1="0" y1="330" x2="800" y2="330" stroke="#5D4037" stroke-width="2"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#5D4037" stroke-width="2"/>
  </g>
  <!-- Machine frame -->
  <rect x="200" y="160" width="400" height="60" rx="8" fill="#E53935" stroke="#C62828" stroke-width="2"/>
  <!-- Seed hopper -->
  <path d="M300 160 L340 100 L460 100 L500 160" fill="#FF7043" stroke="#E64A19" stroke-width="2"/>
  <text x="360" y="140" fill="white" font-family="monospace" font-size="12" font-weight="bold">SEEDS</text>
  <!-- Wheels -->
  <circle cx="240" cy="250" r="35" fill="#424242" stroke="#212121" stroke-width="3"/>
  <circle cx="240" cy="250" r="15" fill="#616161"/>
  <circle cx="560" cy="250" r="35" fill="#424242" stroke="#212121" stroke-width="3"/>
  <circle cx="560" cy="250" r="15" fill="#616161"/>
  <!-- Seed tubes -->
  <line x1="320" y1="220" x2="320" y2="290" stroke="#FFB74D" stroke-width="4"/>
  <line x1="370" y1="220" x2="370" y2="290" stroke="#FFB74D" stroke-width="4"/>
  <line x1="420" y1="220" x2="420" y2="290" stroke="#FFB74D" stroke-width="4"/>
  <line x1="470" y1="220" x2="470" y2="290" stroke="#FFB74D" stroke-width="4"/>
  <!-- Seeds dropping -->
  <g>
    <circle cx="320" cy="295" r="3" fill="#8D6E63"><animate attributeName="cy" values="290;310;290" dur="1s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="298" r="3" fill="#8D6E63"><animate attributeName="cy" values="290;310;290" dur="1s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="293" r="3" fill="#8D6E63"><animate attributeName="cy" values="290;310;290" dur="1s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="296" r="3" fill="#8D6E63"><animate attributeName="cy" values="290;310;290" dur="1s" begin="0.6s" repeatCount="indefinite"/></circle>
  </g>
  <!-- GPS antenna -->
  <line x1="480" y1="100" x2="480" y2="60" stroke="#666" stroke-width="3"/>
  <circle cx="480" cy="55" r="8" fill="#4CAF50"/>
  <text x="492" y="60" fill="#4CAF50" font-family="monospace" font-size="10" font-weight="bold">GPS</text>
  <!-- HUD -->
  <rect x="60" y="60" width="160" height="75" rx="10" fill="#0d1b2a" stroke="#4CAF50" stroke-width="2"/>
  <text x="75" y="85" fill="#4CAF50" font-family="monospace" font-size="11" font-weight="bold">DEPTH: 4.5 cm</text>
  <text x="75" y="102" fill="#FFB74D" font-family="monospace" font-size="11" font-weight="bold">SPACING: 22 cm</text>
  <text x="75" y="119" fill="#4FC3F7" font-family="monospace" font-size="11" font-weight="bold">RATE: 85 kg/ha</text>
  <!-- Hitch bar -->
  <line x1="200" y1="190" x2="130" y2="190" stroke="#9E9E9E" stroke-width="6"/>
  <circle cx="125" cy="190" r="8" fill="none" stroke="#9E9E9E" stroke-width="3"/>
</svg>
