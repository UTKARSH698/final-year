<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="spsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#spsky)"/>
  <!-- Sun -->
  <circle cx="650" cy="80" r="50" fill="#FFB300" opacity="0.8"/>
  <g transform="translate(650,80)" opacity="0.3">
    <line x1="0" y1="-70" x2="0" y2="-60" stroke="#FFB300" stroke-width="3"/>
    <line x1="50" y1="-50" x2="42" y2="-42" stroke="#FFB300" stroke-width="3"/>
    <line x1="70" y1="0" x2="60" y2="0" stroke="#FFB300" stroke-width="3"/>
    <line x1="50" y1="50" x2="42" y2="42" stroke="#FFB300" stroke-width="3"/>
    <line x1="-50" y1="-50" x2="-42" y2="-42" stroke="#FFB300" stroke-width="3"/>
    <line x1="-70" y1="0" x2="-60" y2="0" stroke="#FFB300" stroke-width="3"/>
  </g>
  <rect y="300" width="800" height="100" fill="#8D6E63" opacity="0.3"/>
  <!-- Solar panels -->
  <g transform="translate(200, 120) rotate(-15)">
    <rect width="200" height="120" rx="5" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
    <line x1="50" y1="0" x2="50" y2="120" stroke="#1976D2" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="120" stroke="#1976D2" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="120" stroke="#1976D2" stroke-width="1"/>
    <line x1="0" y1="40" x2="200" y2="40" stroke="#1976D2" stroke-width="1"/>
    <line x1="0" y1="80" x2="200" y2="80" stroke="#1976D2" stroke-width="1"/>
  </g>
  <!-- Panel stand -->
  <rect x="290" y="230" width="10" height="70" fill="#9E9E9E"/>
  <!-- Cable -->
  <path d="M295 300 Q350 320 420 290" fill="none" stroke="#F44336" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Pump unit -->
  <rect x="400" y="250" width="100" height="60" rx="10" fill="#37474F" stroke="#263238" stroke-width="2"/>
  <circle cx="450" cy="280" r="18" fill="#546E7A" stroke="#455A64" stroke-width="2"/>
  <circle cx="450" cy="280" r="6" fill="#FFB300"/>
  <!-- Pipe from pump -->
  <rect x="500" y="265" width="120" height="16" rx="4" fill="#78909C"/>
  <!-- Water outlet -->
  <g>
    <path d="M620 273 Q640 260 660 273 Q680 286 700 273" fill="none" stroke="#29B6F6" stroke-width="4"/>
    <circle cx="650" cy="285" r="4" fill="#29B6F6" opacity="0.6"><animate attributeName="cy" values="285;310;285" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="280" r="3" fill="#29B6F6" opacity="0.5"><animate attributeName="cy" values="280;315;280" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/></circle>
  </g>
  <!-- Display -->
  <rect x="60" y="280" width="150" height="65" rx="10" fill="#0d1b2a" stroke="#FFB300" stroke-width="2"/>
  <text x="75" y="305" fill="#FFB300" font-family="monospace" font-size="11" font-weight="bold">SOLAR: 2.8 kW</text>
  <text x="75" y="322" fill="#4FC3F7" font-family="monospace" font-size="11" font-weight="bold">FLOW: 18,000 L/hr</text>
  <text x="75" y="339" fill="#81C784" font-family="monospace" font-size="11" font-weight="bold">COST: ₹0/unit</text>
</svg>
