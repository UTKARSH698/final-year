<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2a1a"/>
    </linearGradient>
    <linearGradient id="field1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="field2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="field3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#827717"/>
      <stop offset="100%" stop-color="#9E9D24"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#sky)"/>

  <!-- Farm fields - patchwork pattern -->
  <!-- Large wheat field -->
  <rect x="0" y="0" width="350" height="320" fill="url(#field1)" opacity="0.9"/>
  <!-- Crop rows -->
  <g opacity="0.3" stroke="#4CAF50" stroke-width="1">
    <line x1="0" y1="20" x2="350" y2="20"/><line x1="0" y1="40" x2="350" y2="40"/>
    <line x1="0" y1="60" x2="350" y2="60"/><line x1="0" y1="80" x2="350" y2="80"/>
    <line x1="0" y1="100" x2="350" y2="100"/><line x1="0" y1="120" x2="350" y2="120"/>
    <line x1="0" y1="140" x2="350" y2="140"/><line x1="0" y1="160" x2="350" y2="160"/>
    <line x1="0" y1="180" x2="350" y2="180"/><line x1="0" y1="200" x2="350" y2="200"/>
    <line x1="0" y1="220" x2="350" y2="220"/><line x1="0" y1="240" x2="350" y2="240"/>
    <line x1="0" y1="260" x2="350" y2="260"/><line x1="0" y1="280" x2="350" y2="280"/>
    <line x1="0" y1="300" x2="350" y2="300"/>
  </g>

  <!-- Rice paddy field -->
  <rect x="360" y="0" width="440" height="250" fill="url(#field2)" opacity="0.85"/>
  <g opacity="0.25" stroke="#7CB342" stroke-width="1">
    <line x1="360" y1="25" x2="800" y2="25"/><line x1="360" y1="50" x2="800" y2="50"/>
    <line x1="360" y1="75" x2="800" y2="75"/><line x1="360" y1="100" x2="800" y2="100"/>
    <line x1="360" y1="125" x2="800" y2="125"/><line x1="360" y1="150" x2="800" y2="150"/>
    <line x1="360" y1="175" x2="800" y2="175"/><line x1="360" y1="200" x2="800" y2="200"/>
    <line x1="360" y1="225" x2="800" y2="225"/>
  </g>

  <!-- Harvested field -->
  <rect x="360" y="260" width="440" height="220" fill="#5D4037" opacity="0.6"/>
  <g opacity="0.2" stroke="#8D6E63" stroke-width="1">
    <line x1="360" y1="280" x2="800" y2="280"/><line x1="360" y1="300" x2="800" y2="300"/>
    <line x1="360" y1="320" x2="800" y2="320"/><line x1="360" y1="340" x2="800" y2="340"/>
    <line x1="360" y1="360" x2="800" y2="360"/><line x1="360" y1="380" x2="800" y2="380"/>
    <line x1="360" y1="400" x2="800" y2="400"/><line x1="360" y1="420" x2="800" y2="420"/>
    <line x1="360" y1="440" x2="800" y2="440"/><line x1="360" y1="460" x2="800" y2="460"/>
  </g>

  <!-- Sugar cane field -->
  <rect x="0" y="330" width="350" height="250" fill="url(#field3)" opacity="0.8"/>
  <g opacity="0.2" stroke="#C0CA33" stroke-width="1.5">
    <line x1="20" y1="330" x2="20" y2="580"/><line x1="40" y1="330" x2="40" y2="580"/>
    <line x1="60" y1="330" x2="60" y2="580"/><line x1="80" y1="330" x2="80" y2="580"/>
    <line x1="100" y1="330" x2="100" y2="580"/><line x1="120" y1="330" x2="120" y2="580"/>
    <line x1="140" y1="330" x2="140" y2="580"/><line x1="160" y1="330" x2="160" y2="580"/>
    <line x1="180" y1="330" x2="180" y2="580"/><line x1="200" y1="330" x2="200" y2="580"/>
    <line x1="220" y1="330" x2="220" y2="580"/><line x1="240" y1="330" x2="240" y2="580"/>
    <line x1="260" y1="330" x2="260" y2="580"/><line x1="280" y1="330" x2="280" y2="580"/>
    <line x1="300" y1="330" x2="300" y2="580"/><line x1="320" y1="330" x2="320" y2="580"/>
    <line x1="340" y1="330" x2="340" y2="580"/>
  </g>

  <!-- Bottom fields -->
  <rect x="0" y="590" width="400" height="210" fill="#2E7D32" opacity="0.7"/>
  <rect x="410" y="490" width="390" height="310" fill="#388E3C" opacity="0.75"/>
  <g opacity="0.2" stroke="#66BB6A" stroke-width="1">
    <line x1="410" y1="510" x2="800" y2="510"/><line x1="410" y1="540" x2="800" y2="540"/>
    <line x1="410" y1="570" x2="800" y2="570"/><line x1="410" y1="600" x2="800" y2="600"/>
    <line x1="410" y1="630" x2="800" y2="630"/><line x1="410" y1="660" x2="800" y2="660"/>
    <line x1="410" y1="690" x2="800" y2="690"/><line x1="410" y1="720" x2="800" y2="720"/>
    <line x1="410" y1="750" x2="800" y2="750"/><line x1="410" y1="780" x2="800" y2="780"/>
  </g>

  <!-- Irrigation canal -->
  <path d="M0 585 Q200 595 355 585 Q380 490 360 320 L355 320 Q375 490 350 580 Q200 590 0 580 Z" fill="url(#water)" opacity="0.8"/>
  <path d="M355 490 Q500 485 800 490 L800 483 Q500 478 355 483 Z" fill="url(#water)" opacity="0.7"/>

  <!-- Water shimmer animation -->
  <rect x="100" y="581" width="40" height="3" rx="1" fill="#42A5F5" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="200" y="583" width="30" height="2" rx="1" fill="#42A5F5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Farm road -->
  <rect x="353" y="0" width="5" height="800" fill="#795548" opacity="0.6"/>
  <rect x="405" y="480" width="5" height="320" fill="#795548" opacity="0.5"/>

  <!-- Trees / Boundary -->
  <g opacity="0.6">
    <circle cx="356" cy="15" r="8" fill="#1B5E20"/>
    <circle cx="356" cy="35" r="7" fill="#2E7D32"/>
    <circle cx="356" cy="55" r="8" fill="#1B5E20"/>
    <circle cx="356" cy="610" r="9" fill="#1B5E20"/>
    <circle cx="356" cy="640" r="7" fill="#2E7D32"/>
    <circle cx="356" cy="670" r="8" fill="#1B5E20"/>
    <circle cx="356" cy="700" r="9" fill="#2E7D32"/>
  </g>

  <!-- GPS scan markers with pulse -->
  <g transform="translate(180, 160)">
    <circle r="4" fill="#FF5722"/>
    <circle r="10" fill="none" stroke="#FF5722" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="10;18;10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(550, 140)">
    <circle r="4" fill="#4CAF50"/>
    <circle r="10" fill="none" stroke="#4CAF50" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="10;18;10" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(600, 400)">
    <circle r="4" fill="#FFB300"/>
    <circle r="10" fill="none" stroke="#FFB300" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="10;18;10" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(200, 450)">
    <circle r="4" fill="#29B6F6"/>
    <circle r="10" fill="none" stroke="#29B6F6" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="10;18;10" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Drone scan line sweeping -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#FFD600" stroke-width="2" opacity="0.3">
    <animate attributeName="y1" values="0;800;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;800;0" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Grid overlay -->
  <g opacity="0.08" stroke="#FFD600" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/><line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
  </g>
</svg>
