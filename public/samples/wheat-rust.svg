<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a2e1a"/>
  <!-- Wheat leaf - long narrow blade -->
  <path d="M200,20 Q230,50 245,120 Q255,200 250,280 Q240,340 200,380 Q160,340 150,280 Q145,200 155,120 Q170,50 200,20Z" fill="#5a8a40" stroke="#4a7a30" stroke-width="1.5"/>
  <!-- Central vein -->
  <line x1="200" y1="30" x2="200" y2="370" stroke="#4a7a30" stroke-width="2.5" opacity="0.6"/>
  <!-- Parallel veins typical of wheat -->
  <line x1="175" y1="60" x2="170" y2="350" stroke="#4a7a30" stroke-width="0.8" opacity="0.3"/>
  <line x1="225" y1="60" x2="230" y2="350" stroke="#4a7a30" stroke-width="0.8" opacity="0.3"/>
  <line x1="188" y1="45" x2="185" y2="365" stroke="#4a7a30" stroke-width="0.6" opacity="0.25"/>
  <line x1="212" y1="45" x2="215" y2="365" stroke="#4a7a30" stroke-width="0.6" opacity="0.25"/>
  <!-- Rust pustules - small orange-brown raised bumps in rows -->
  <!-- Row 1 -->
  <ellipse cx="185" cy="75" rx="7" ry="4" fill="#c46a1a" opacity="0.9"/>
  <ellipse cx="210" cy="80" rx="8" ry="4.5" fill="#d47a20" opacity="0.85"/>
  <ellipse cx="195" cy="90" rx="6" ry="3.5" fill="#c46a1a" opacity="0.88"/>
  <!-- Row 2 -->
  <ellipse cx="178" cy="115" rx="9" ry="5" fill="#d47a20" opacity="0.9"/>
  <ellipse cx="205" cy="110" rx="7" ry="4" fill="#c46a1a" opacity="0.87"/>
  <ellipse cx="222" cy="120" rx="8" ry="4.5" fill="#b85a15" opacity="0.85"/>
  <ellipse cx="190" cy="125" rx="6" ry="3" fill="#d47a20" opacity="0.8"/>
  <!-- Row 3 -->
  <ellipse cx="170" cy="155" rx="8" ry="4.5" fill="#c46a1a" opacity="0.9"/>
  <ellipse cx="195" cy="150" rx="9" ry="5" fill="#d47a20" opacity="0.88"/>
  <ellipse cx="220" cy="158" rx="7" ry="4" fill="#c46a1a" opacity="0.85"/>
  <ellipse cx="240" cy="165" rx="6" ry="3.5" fill="#b85a15" opacity="0.8"/>
  <!-- Row 4 -->
  <ellipse cx="175" cy="195" rx="8" ry="4.5" fill="#d47a20" opacity="0.9"/>
  <ellipse cx="200" cy="190" rx="10" ry="5.5" fill="#c46a1a" opacity="0.92"/>
  <ellipse cx="228" cy="198" rx="8" ry="4" fill="#d47a20" opacity="0.86"/>
  <ellipse cx="160" cy="200" rx="6" ry="3" fill="#b85a15" opacity="0.78"/>
  <!-- Row 5 -->
  <ellipse cx="180" cy="235" rx="9" ry="5" fill="#c46a1a" opacity="0.88"/>
  <ellipse cx="208" cy="230" rx="8" ry="4.5" fill="#d47a20" opacity="0.9"/>
  <ellipse cx="235" cy="238" rx="7" ry="4" fill="#c46a1a" opacity="0.83"/>
  <!-- Row 6 -->
  <ellipse cx="185" cy="270" rx="8" ry="4.5" fill="#d47a20" opacity="0.87"/>
  <ellipse cx="212" cy="265" rx="9" ry="5" fill="#c46a1a" opacity="0.9"/>
  <ellipse cx="170" cy="278" rx="6" ry="3.5" fill="#b85a15" opacity="0.82"/>
  <!-- Row 7 -->
  <ellipse cx="190" cy="305" rx="7" ry="4" fill="#c46a1a" opacity="0.85"/>
  <ellipse cx="215" cy="300" rx="8" ry="4.5" fill="#d47a20" opacity="0.88"/>
  <!-- Row 8 -->
  <ellipse cx="195" cy="335" rx="6" ry="3.5" fill="#c46a1a" opacity="0.82"/>
  <ellipse cx="210" cy="340" rx="5" ry="3" fill="#d47a20" opacity="0.8"/>
  <!-- Pustule highlights -->
  <ellipse cx="200" cy="189" rx="5" ry="2.5" fill="#e8943a" opacity="0.4"/>
  <ellipse cx="178" cy="114" rx="4.5" ry="2" fill="#e8943a" opacity="0.35"/>
  <ellipse cx="195" cy="149" rx="5" ry="2.5" fill="#e8943a" opacity="0.38"/>
  <!-- Yellowing streaks between pustules -->
  <path d="M170,100 Q185,130 175,160" fill="none" stroke="#a8a040" stroke-width="8" opacity="0.15"/>
  <path d="M215,140 Q225,180 218,220" fill="none" stroke="#a8a040" stroke-width="10" opacity="0.12"/>
  <path d="M180,230 Q195,270 188,310" fill="none" stroke="#a8a040" stroke-width="8" opacity="0.1"/>
  <!-- Label -->
  <rect x="110" y="365" width="180" height="28" rx="6" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="384" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Wheat Rust Disease</text>
</svg>