<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a2e1a"/>
  <!-- Rice leaf blade shape -->
  <path d="M200,30 Q260,100 270,200 Q260,300 200,370 Q140,300 130,200 Q140,100 200,30Z" fill="#4a7a3a" stroke="#3a6a2a" stroke-width="1.5"/>
  <!-- Central vein -->
  <line x1="200" y1="40" x2="200" y2="360" stroke="#3a6a2a" stroke-width="2.5" opacity="0.7"/>
  <!-- Side veins -->
  <line x1="200" y1="80" x2="155" y2="100" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="80" x2="245" y2="100" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="120" x2="145" y2="145" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="120" x2="255" y2="145" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="160" x2="138" y2="185" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="160" x2="262" y2="185" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="200" x2="135" y2="220" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="200" x2="265" y2="220" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="240" x2="140" y2="260" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="240" x2="260" y2="260" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="280" x2="150" y2="298" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="280" x2="250" y2="298" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="320" x2="165" y2="335" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="320" x2="235" y2="335" stroke="#3a6a2a" stroke-width="1" opacity="0.4"/>
  <!-- Blast lesions - diamond/eye-shaped with gray centers and brown margins -->
  <ellipse cx="175" cy="120" rx="18" ry="10" fill="#8B7D3B" opacity="0.9" transform="rotate(-15,175,120)"/>
  <ellipse cx="175" cy="120" rx="10" ry="5" fill="#a89860" opacity="0.8" transform="rotate(-15,175,120)"/>
  <ellipse cx="230" cy="160" rx="22" ry="11" fill="#8B7D3B" opacity="0.85" transform="rotate(10,230,160)"/>
  <ellipse cx="230" cy="160" rx="12" ry="6" fill="#b5a570" opacity="0.7" transform="rotate(10,230,160)"/>
  <ellipse cx="185" cy="210" rx="20" ry="9" fill="#7a6d30" opacity="0.9" transform="rotate(-8,185,210)"/>
  <ellipse cx="185" cy="210" rx="11" ry="5" fill="#a89860" opacity="0.75" transform="rotate(-8,185,210)"/>
  <ellipse cx="220" cy="250" rx="16" ry="8" fill="#8B7D3B" opacity="0.88"/>
  <ellipse cx="220" cy="250" rx="9" ry="4" fill="#c4b680" opacity="0.7"/>
  <ellipse cx="165" cy="280" rx="14" ry="7" fill="#7a6d30" opacity="0.85" transform="rotate(12,165,280)"/>
  <ellipse cx="240" cy="110" rx="12" ry="6" fill="#8B6914" opacity="0.8" transform="rotate(-5,240,110)"/>
  <ellipse cx="160" cy="170" rx="15" ry="7" fill="#8B6914" opacity="0.85" transform="rotate(8,160,170)"/>
  <ellipse cx="210" cy="310" rx="13" ry="6" fill="#7a6d30" opacity="0.8"/>
  <!-- Yellowing around lesions -->
  <ellipse cx="175" cy="120" rx="28" ry="16" fill="#a8a040" opacity="0.15" transform="rotate(-15,175,120)"/>
  <ellipse cx="230" cy="160" rx="32" ry="17" fill="#a8a040" opacity="0.12" transform="rotate(10,230,160)"/>
  <ellipse cx="185" cy="210" rx="30" ry="15" fill="#a8a040" opacity="0.13" transform="rotate(-8,185,210)"/>
  <!-- Label -->
  <rect x="100" y="365" width="200" height="28" rx="6" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="384" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Rice Blast Disease</text>
</svg>