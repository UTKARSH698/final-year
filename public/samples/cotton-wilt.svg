<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a2e1a"/>
  <!-- Cotton leaf - broad palmate shape with 3-5 lobes -->
  <path d="M200,40 Q250,55 280,90 Q310,130 305,170 Q330,160 345,180 Q350,200 335,215 Q315,225 300,210 Q305,250 290,280 Q270,310 240,330 Q215,340 200,345 Q185,340 160,330 Q130,310 110,280 Q95,250 100,210 Q85,225 65,215 Q50,200 55,180 Q70,160 95,170 Q90,130 120,90 Q150,55 200,40Z" fill="#6a9a4a" stroke="#5a8a3a" stroke-width="1.5"/>
  <!-- Main veins radiating from center -->
  <path d="M200,180 L200,50" fill="none" stroke="#5a8a3a" stroke-width="2" opacity="0.5"/>
  <path d="M200,180 L130,90" fill="none" stroke="#5a8a3a" stroke-width="2" opacity="0.5"/>
  <path d="M200,180 L270,90" fill="none" stroke="#5a8a3a" stroke-width="2" opacity="0.5"/>
  <path d="M200,180 L110,270" fill="none" stroke="#5a8a3a" stroke-width="2" opacity="0.5"/>
  <path d="M200,180 L290,270" fill="none" stroke="#5a8a3a" stroke-width="2" opacity="0.5"/>
  <path d="M200,180 L200,340" fill="none" stroke="#5a8a3a" stroke-width="2" opacity="0.5"/>
  <!-- Fusarium wilt - yellowing from edges inward, brown dead patches -->
  <!-- Edge yellowing -->
  <path d="M280,90 Q310,130 305,170 Q330,160 345,180 Q350,200 335,215 Q315,225 300,210 Q305,250 290,280" fill="#8a8a30" opacity="0.45"/>
  <path d="M120,90 Q90,130 95,170 Q70,160 55,180 Q50,200 65,215 Q85,225 100,210 Q95,250 110,280" fill="#8a8a30" opacity="0.4"/>
  <!-- Dead brown margins -->
  <path d="M305,170 Q330,160 345,180 Q350,200 335,215 Q315,225 300,210" fill="#6a5a20" opacity="0.6"/>
  <path d="M95,170 Q70,160 55,180 Q50,200 65,215 Q85,225 100,210" fill="#6a5a20" opacity="0.55"/>
  <!-- Necrotic brown patches -->
  <path d="M260,100 Q275,110 280,130 Q270,140 255,130 Q250,115 260,100Z" fill="#5a4a18" opacity="0.7"/>
  <path d="M140,100 Q125,110 120,130 Q130,140 145,130 Q150,115 140,100Z" fill="#5a4a18" opacity="0.65"/>
  <path d="M285,240 Q295,255 290,270 Q278,275 270,262 Q275,248 285,240Z" fill="#5a4a18" opacity="0.7"/>
  <path d="M115,240 Q105,255 110,270 Q122,275 130,262 Q125,248 115,240Z" fill="#5a4a18" opacity="0.65"/>
  <!-- Wilting/drooping effect - brown spots along veins -->
  <ellipse cx="210" cy="130" rx="10" ry="6" fill="#8a7a30" opacity="0.5" transform="rotate(-10,210,130)"/>
  <ellipse cx="180" cy="140" rx="12" ry="7" fill="#8a7a30" opacity="0.45" transform="rotate(15,180,140)"/>
  <ellipse cx="230" cy="220" rx="14" ry="8" fill="#7a6a25" opacity="0.5" transform="rotate(-5,230,220)"/>
  <ellipse cx="170" cy="230" rx="11" ry="6" fill="#7a6a25" opacity="0.48"/>
  <ellipse cx="200" cy="280" rx="13" ry="7" fill="#8a7a30" opacity="0.45"/>
  <!-- Interveinal chlorosis (yellow between veins) -->
  <path d="M200,100 Q220,120 230,150 Q210,140 200,120Z" fill="#a8a840" opacity="0.2"/>
  <path d="M200,100 Q180,120 170,150 Q190,140 200,120Z" fill="#a8a840" opacity="0.18"/>
  <path d="M200,200 Q230,230 250,270 Q220,250 200,220Z" fill="#a8a840" opacity="0.15"/>
  <path d="M200,200 Q170,230 150,270 Q180,250 200,220Z" fill="#a8a840" opacity="0.15"/>
  <!-- Label -->
  <rect x="105" y="365" width="190" height="28" rx="6" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="384" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Cotton Fusarium Wilt</text>
</svg>