<!DOCTYPE html>
<html>
<head><title>Download Soil Card PNG</title></head>
<body style="margin:40px;font-family:sans-serif">
<h2>Soil Health Card → PNG Converter</h2>
<p>Click the button to download a proper PNG with all text visible.</p>
<button id="btn" style="padding:12px 24px;font-size:16px;cursor:pointer;background:#2d6a2e;color:white;border:none;border-radius:8px">Download PNG</button>
<p id="status"></p>
<script>
document.getElementById('btn').addEventListener('click', async () => {
  const status = document.getElementById('status');
  status.textContent = 'Loading SVG...';

  const resp = await fetch('/samples/soil-health-card-sample.svg');
  const svgText = await resp.text();

  // Convert SVG text to a data URL so fonts render in the image
  const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
  const svgUrl = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    status.textContent = 'Rendering to canvas...';
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth || 900;
    canvas.height = img.naturalHeight || 1200;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    canvas.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'soil-health-card-sample.png';
      a.click();
      URL.revokeObjectURL(a.href);
      status.textContent = 'Downloaded! Check your Downloads folder.';
    }, 'image/png');

    URL.revokeObjectURL(svgUrl);
  };
  img.onerror = () => {
    status.textContent = 'Failed to load SVG. Try the screenshot method instead.';
  };
  img.src = svgUrl;
});
</script>
</body>
</html>
