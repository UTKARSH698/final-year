databases:
  - name: agrifuture-db
    databaseName: agrifuture
    user: agrifuture
    plan: free

services:
  - type: web
    name: agrifuture
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: agrifuture-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MSG91_AUTH_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
